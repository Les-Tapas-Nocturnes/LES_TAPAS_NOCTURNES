<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Répertoire - Les Tapas Nocturnes</title>
<link rel="stylesheet" href="style.css" />
<style>
  /* Conteneur pour la liste des chansons */
  .song-container {
    background: #fefefe;
    max-width: 600px;
    margin: 20px auto 40px auto;
    padding: 20px 25px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #222;
    text-align: left;
  }

  .song-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .song-list li {
    padding: 10px 0;
    border-bottom: 1px solid #ddd;
    font-size: 16px;
    line-height: 1.4;
  }

  .song-list li:last-child {
    border-bottom: none;
  }

  .song-title {
    font-weight: 600;
  }

  .song-meta {
    font-style: italic;
    color: #666;
    font-size: 14px;
    margin-top: 2px;
  }

  /* Responsive pour mobile */
  @media screen and (max-width: 600px) {
    .song-container {
      margin: 15px 10px 30px 10px;
      padding: 15px 15px;
      max-width: 100%;
    }

    .song-list li {
      font-size: 14px;
    }

    .song-meta {
      font-size: 12px;
    }
  }
</style>
</head>
<body>

<!-- LOGO -->
<img src="logo.png" class="logo" alt="Les Tapas Nocturnes" />

<!-- MENU COMMUN -->
<div class="menu">
  <a href="index.html" class="menu-button accueil">ACCUEIL</a>
  <a href="repertoire.html" class="menu-button repertoire">RÉPERTOIRE</a>
  <a href="paroles.html" class="menu-button paroles">PAROLES</a>
  <a href="agenda.html" class="menu-button agenda">AGENDA</a>
  <a href="contact.html" class="menu-button contact">CONTACT</a>
</div>

<!-- CONTENEUR LISTE CHANSONS -->
<div class="song-container">
  <ul class="song-list">
    <li>
      <div class="song-title">Et moi, et moi, et moi</div>
      <div class="song-meta">Jacques Dutronc — 1966</div>
    </li>
    <li>
      <div class="song-title">La fille du Père Noël</div>
      <div class="song-meta">Jacques Dutronc — 1966</div>
    </li>
    <li>
      <div class="song-title">Sarbacane</div>
      <div class="song-meta">Francis Cabrel — 1989</div>
    </li>
    <!-- ajoute le reste de tes chansons ici, dans ce même format -->
  </ul>
</div>

</body>
</html>
