<style>
  /* Désactive le filigrane sur l'accueil */
  body::before { display: none; }
  @keyframes shake {
    0%, 100% { transform: rotate(0deg) scale(1); }
    20% { transform: rotate(-3deg) scale(1.03); }
    40% { transform: rotate(3deg) scale(1.05); }
    60% { transform: rotate(-2deg) scale(1.03); }
    80% { transform: rotate(2deg) scale(1.01); }
  }
  .logo { animation: shake 0.8s ease-in-out infinite; }
  footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    text-align: center;
    padding: 10px 0;
    font-size: 0.95rem;
    color: rgba(0, 0, 0, 0.55);
    letter-spacing: 0.05em;
  }
</style>
