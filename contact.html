<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact - Les Tapas Nocturnes</title>
<link rel="stylesheet" href="style.css" />
<style>
  .contact-wrapper {
    max-width: 420px;
    margin: 30px auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 0 20px;
  }
  .contact-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: white;
    border-radius: 50px;
    border: 4px solid black;
    box-shadow: 0px 6px 10px rgba(0,0,0,0.3);
    padding: 16px 24px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1rem;
    color: white;
    transition: transform 0.15s ease;
  }
  .contact-card:hover {
    transform: scale(1.03);
  }
  .contact-card .icon {
    font-size: 1.8rem;
  }
  .contact-card .info {
    display: flex;
    flex-direction: column;
    text-align: left;
  }
  .contact-card .label {
    font-size: 0.75rem;
    opacity: 0.85;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .contact-card .value {
    font-size: 1rem;
  }
  .card-email {
    background: linear-gradient(#4caf50, #2e7d32);
  }
  .card-instagram {
    background: linear-gradient(#f58529, #c13584);
  }
</style>
</head>
<body>
<h1 class="page-title">Contact</h1>
<a href="index.html" class="btn-retour couleur-contact">← Retour à l'accueil</a>

<div class="contact-wrapper">

  <a href="mailto:lestapasnocturnes64@gmail.com" class="contact-card card-email">
    <span class="icon">📧</span>
    <div class="info">
      <span class="label">Email</span>
      <span class="value">lestapasnocturnes64@gmail.com</span>
    </div>
  </a>

  <a href="https://www.instagram.com/les_tapas_nocturnes" target="_blank" class="contact-card card-instagram">
    <span class="icon">📸</span>
    <div class="info">
      <span class="label">Instagram</span>
      <span class="value">@les_tapas_nocturnes</span>
    </div>
  </a>

</div>
</body>
</html>
