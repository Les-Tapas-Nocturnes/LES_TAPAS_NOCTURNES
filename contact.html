<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact - Les Tapas Nocturnes</title>
<link rel="stylesheet" href="style.css" />
<style>
  .btn-retour {
    display: block;
    width: 180px;
    max-width: 85%;
    margin: 20px auto 10px auto;
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    background: linear-gradient(#4caf50,#2e7d32);
    border-radius: 50px;
    border: 4px solid black;
    box-shadow: 0px 6px 10px rgba(0,0,0,0.4);
    text-align: center;
    text-decoration: none;
  }
  .btn-retour:hover {
    background: linear-gradient(#2e7d32,#4caf50);
  }

  .contact-container {
    max-width: 600px;
    margin: 20px auto 40px auto;
    padding: 20px 25px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #222;
    text-align: center;
  }

  h1.page-title {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: bold;
    font-size: 28px;
    color: #4a4a4a;
    text-align: center;
    margin-top: 20px;
    margin-bottom: 10px;
  }

  @media screen and (max-width: 600px) {
    .btn-retour {
      width: 85%;
      font-size: 16px;
      padding: 12px;
    }

    .contact-container {
      margin: 15px 10px 30px 10px;
      padding: 15px 15px;
      max-width: 100%;
    }

    h1.page-title {
      font-size: 24px;
      margin-top: 15px;
    }
  }
</style>
</head>
<body>

<!-- LOGO -->
<img src="logo.png" class="logo" alt="Les Tapas Nocturnes" />

<!-- TITRE PAGE -->
<h1 class="page-title">Contact</h1>

<!-- BOUTON RETOUR -->
<a href="index.html" class="btn-retour">← Retour à l’accueil</a>

<!-- CONTENU CONTACT -->
<div class="contact-container">
  <p>Pour nous joindre, écrivez-nous à : <a href="mailto:contact@lestapasnocturnes.com">contact@lestapasnocturnes.com</a></p>
</div>

</body>
</html>
