<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact - Les Tapas Nocturnes</title>
<link rel="stylesheet" href="style.css" />
<style>
  .contact-wrapper {
    max-width: 360px;
    margin: 20px auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 0 20px;
  }
  .contact-card {
    display: flex;
    align-items: center;
    gap: 16px;
    border-radius: 50px;
    border: 4px solid black;
    box-shadow: 0px 6px 10px rgba(0,0,0,0.3);
    padding: 14px 24px;
    text-decoration: none;
    font-weight: bold;
    color: white;
    transition: transform 0.15s ease;
  }
  .contact-card:hover {
    transform: scale(1.03);
  }
  .contact-card svg {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }
  .contact-card .info {
    display: flex;
    flex-direction: column;
    text-align: left;
  }
  .contact-card .label {
    font-size: 0.7rem;
    opacity: 0.85;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .contact-card .value {
    font-size: 0.95rem;
  }
  .card-email {
    background: linear-gradient(#4caf50, #2e7d32);
  }
  .card-instagram {
    background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af);
  }
</style>
</head>
<body>

<h1 class="page-title">Contact</h1>
<a href="index.html" class="btn-retour couleur-contact">← Retour à l'accueil</a>

<div class="contact-wrapper">

  <!-- Gmail -->
  <a href="mailto:lestapasnocturnes64@gmail.com" class="contact-card card-email">
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="white"/>
      <path d="M8 12h32v24H8z" fill="#f1f1f1"/>
      <path d="M8 12l16 13L40 12" fill="none" stroke="#4caf50" stroke-width="2.5"/>
      <path d="M8 12v24h32V12L24 25 8 12z" fill="white"/>
      <path d="M8 12l16 13L40 12" fill="#4caf50"/>
    </svg>
    <div class="info">
      <span class="label">Email</span>
      <span class="value">lestapasnocturnes64@gmail.com</span>
    </div>
  </a>

  <!-- Instagram -->
  <a href="https://www.instagram.com/les_tapas_nocturnes" target="_blank" class="contact-card card-instagram">
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="8" fill="white"/>
      <rect x="9" y="9" width="30" height="30" rx="8" fill="none" stroke="url(#ig)" stroke-width="3"/>
      <circle cx="24" cy="24" r="8" fill="none" stroke="url(#ig)" stroke-width="3"/>
      <circle cx="34" cy="14" r="2" fill="#dd2a7b"/>
      <defs>
        <linearGradient id="ig" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#f58529"/>
          <stop offset="50%" stop-color="#dd2a7b"/>
          <stop offset="100%" stop-color="#8134af"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="info">
      <span class="label">Instagram</span>
      <span class="value">@les_tapas_nocturnes</span>
    </div>
  </a>

</div>
</body>
</html>
