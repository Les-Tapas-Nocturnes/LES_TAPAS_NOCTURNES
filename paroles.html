<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paroles - Les Tapas Nocturnes</title>
<link rel="stylesheet" href="style.css" />
<style>
  /* Bouton retour */
  .btn-retour {
    display: block;
    width: 180px;
    max-width: 85%;
    margin: 20px auto 10px auto;
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    color: black;
    background: #e8dcc0;
    border-radius: 50px;
    border: 4px solid black;
    box-shadow: 0px 6px 10px rgba(0,0,0,0.4);
    text-align: center;
    text-decoration: none;
  }
  .btn-retour:hover {
    background: #d2c9a9;
  }

  /* Titre page */
  h1.page-title {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-weight: bold;
    font-size: 28px;
    color: #4a4a4a;
    text-align: center;
    margin-top: 20px;
    margin-bottom: 10px;
  }

  /* Conteneur paroles */
  .lyrics-container {
    background: #fefefe;
    max-width: 600px;
    margin: 0 auto 40px auto;
    padding: 20px 25px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #222;
    text-align: left;
    white-space: pre-wrap; /* conserve retours à la ligne */
  }

  /* Responsive mobile */
  @media screen and (max-width: 600px) {
    .btn-retour {
      width: 85%;
      font-size: 16px;
      padding: 12px;
    }

    .lyrics-container {
      margin: 0 10px 30px 10px;
      padding: 15px 15px;
      max-width: 100%;
    }

    h1.page-title {
      font-size: 24px;
      margin-top: 15px;
    }
  }
</style>
</head>
<body>

<!-- LOGO -->
<img src="logo.png" class="logo" alt="Les Tapas Nocturnes" />

<!-- TITRE PAGE -->
<h1 class="page-title">Paroles</h1>

<!-- BOUTON RETOUR -->
<a href="index.html" class="btn-retour">← Retour à l’accueil</a>

<!-- CONTENU PAROLES -->
<div class="lyrics-container">
  <!-- Remplace ce texte par les paroles que tu veux afficher -->
  <h2>Nom de la chanson</h2>
  <p>
    Ici les paroles de la chanson, avec des retours à la ligne préservés.<br/>
    Par exemple :<br/>
    Bonjour, bonjour, comment ça va ?<br/>
    Moi je chante sous la pluie.<br/>
  </p>
</div>

</body>
</html>
