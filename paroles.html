<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paroles - Les Tapas Nocturnes</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f9f7f1;
    color: #222;
    margin: 0;
    padding: 0;
  }

  /* Bandeau en haut avec boutons */
  .top-bar {
    background-color: #736357;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    color: #f9f7f1;
  }

  .top-bar button {
    background-color: #a68f7d;
    color: #f9f7f1;
    border: none;
    border-radius: 5px;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.3s ease;
  }

  .top-bar button:hover {
    background-color: #9b8170;
  }

  .top-bar .current-page {
    background-color: #f9f7f1;
    color: #736357;
    cursor: default;
  }

  main {
    max-width: 900px;
    margin: 20px auto;
    padding: 0 15px;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #3b3a30;
  }

  .buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 40px;
  }

  .buttons button {
    background-color: #736357;
    color: #f9f7f1;
    border: none;
    border-radius: 5px;
    padding: 10px 18px;
    cursor: pointer;
    font-weight: bold;
    box-shadow: 0 2px 5px rgba(115, 99, 87, 0.4);
    transition: background-color 0.3s ease;
  }

  .buttons button:hover {
    background-color: #a68f7d;
  }

  .song {
    display: none;
    background: #fff9f3;
    border: 1px solid #d7cfc4;
    border-radius: 8px;
    padding: 25px 30px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    line-height: 1.6em;
    font-size: 18px;
    white-space: pre-line;
    max-height: 60vh;
    overflow-y: auto;
  }

  .song h2 {
    margin-top: 0;
    margin-bottom: 20px;
    color: #5c5044;
    font-size: 24px;
  }

  /* Adaptation pour petits écrans */
  @media (max-width: 600px) {
    .top-bar {
      flex-direction: column;
      gap: 8px;
      padding: 10px 15px;
    }

    .buttons button {
      padding: 12px 14px;
      font-size: 16px;
      flex: 1 1 45%;
      min-width: 120px;
    }

    .song {
      font-size: 20px;
      padding: 20px 15px;
      max-height: 50vh;
    }

    .song h2 {
      font-size: 22px;
    }
  }
</style>
</head>
<body>

<!-- Bandeau avec boutons -->
<div class="top-bar">
  <button class="current-page">Paroles</button>
  <button onclick="history.back()">Retour</button>
</div>

<main>
  <h1>Paroles</h1>

  <div class="buttons">
    <button onclick="showSong('song1')">Et moi et moi et moi</button>
    <button onclick="showSong('song2')">La fille du Père Noël</button>
    <button onclick="showSong('song3')">Sarbacane</button>
    <button onclick="showSong('song4')">L'amour à la machine</button>
    <!-- Ajoute ici tes autres boutons -->
  </div>

  <div id="song1" class="song">
    <h2>Et moi et moi et moi</h2>
    Sept cent millions de chinois  
    Et moi, et moi, et moi  
    Avec ma vie, mon petit chez-moi  
    Mon mal de tête, mon point au foie  
    J'y pense et puis j'oublie  
    C'est la vie, c'est la vie
    <!-- Continue ici les paroles -->
  </div>

  <div id="song2" class="song">
    <h2>La fille du Père Noël</h2>
    <!-- Paroles ici -->
  </div>

  <div id="song3" class="song">
    <h2>Sarbacane</h2>
    <!-- Paroles ici -->
  </div>

  <div id="song4" class="song">
    <h2>L'amour à la machine</h2>
    <!-- Paroles ici -->
  </div>

  <!-- Autres chansons -->

</main>

<script>
  function showSong(id) {
    const songs = document.querySelectorAll('.song');
    songs.forEach(song => song.style.display = 'none');

    const selected = document.getElementById(id);
    if (selected) selected.style.display = 'block';
  }

  // Affiche la première chanson au chargement
  showSong('song1');
</script>

</body>
</html>
