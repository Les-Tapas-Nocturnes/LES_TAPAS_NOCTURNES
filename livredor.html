<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Livre d'Or - Les Tapas Nocturnes</title>
  <link rel="icon" href="logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f2ee;
      color: #2a2a2a;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .site-title {
      font-family: 'Caveat', cursive;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      font-weight: 700;
      color: #2a2a2a;
      text-align: center;
      margin-top: 1.2rem;
      line-height: 1.1;
    }
    .page-label {
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      text-align: center;
      margin-top: 0.2rem;
    }
    .logo-wrap {
      width: min(300px, 75vw);
      margin: 0 auto;
    }
    .logo-wrap img { width: 100%; display: block; }

    .btn-back {
      display: inline-block;
      background: #3a9e4a;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.7rem 1.8rem;
      border-radius: 999px;
      text-decoration: none;
      margin: 0.8rem auto 1.4rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-back:hover { background: #2e8a3c; transform: scale(1.03); }

    main {
      width: min(700px, 94vw);
      padding-bottom: 3rem;
    }

    /* ── FORM ── */
    .form-card {
      background: #fff;
      border-radius: 20px;
      padding: 1.8rem;
      margin-bottom: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .form-card h2 {
      font-family: 'Caveat', cursive;
      font-size: 1.9rem;
      color: #2a2a2a;
      margin-bottom: 1.2rem;
    }
    .form-row { margin-bottom: 1rem; }
    .form-row label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.35rem;
    }
    .form-row input,
    .form-row textarea {
      width: 100%;
      background: #f5f2ee;
      border: 2px solid #e0dbd4;
      color: #2a2a2a;
      padding: 0.65rem 1rem;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .form-row input:focus,
    .form-row textarea:focus { outline: none; border-color: #e8463a; }
    .form-row textarea { min-height: 90px; }

    .stars-input { display: flex; gap: 0.4rem; margin-top: 0.3rem; }
    .stars-input span {
      font-size: 2rem;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s, transform 0.15s;
      user-select: none;
    }
    .stars-input span.active { color: #f5a623; }
    .stars-input span:hover { transform: scale(1.2); }

    .btn-submit {
      background: linear-gradient(135deg, #e8463a, #c0392b);
      color: #fff;
      border: none;
      padding: 0.8rem 2.2rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { opacity: 0.9; transform: scale(1.02); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .form-feedback {
      margin-top: 0.8rem;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      display: none;
    }
    .form-feedback.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .form-feedback.error   { background: #ffebee; color: #c62828; display: block; }

    /* ── MESSAGES ── */
    .messages-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
    }
    .messages-title {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      color: #2a2a2a;
    }
    .msg-count { font-size: 0.85rem; color: #aaa; font-weight: 600; }

    .message-card {
      background: #fff;
      border-radius: 18px;
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
      animation: fadeUp 0.35s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 0.4rem;
    }
    .msg-author {
      font-family: 'Caveat', cursive;
      font-size: 1.45rem;
      color: #e8463a;
      font-weight: 700;
    }
    .msg-date { font-size: 0.75rem; color: #bbb; white-space: nowrap; padding-top: 0.35rem; }
    .msg-stars { color: #f5a623; font-size: 1.1rem; margin-bottom: 0.5rem; }
    .msg-text { font-size: 0.95rem; line-height: 1.6; color: #444; }

    .band-reply {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      background: #fff8f0;
      border-left: 4px solid #f5a623;
      border-radius: 0 10px 10px 0;
    }
    .band-reply-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #f5a623;
      margin-bottom: 0.3rem;
    }
    .band-reply p { font-size: 0.9rem; color: #666; font-style: italic; }

    .admin-controls { display: none; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
    .admin-controls.visible { display: flex; }
    .btn-sm {
      padding: 0.35rem 1rem;
      font-size: 0.78rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-sm:hover { opacity: 0.85; transform: scale(1.03); }
    .btn-reply  { background: #e8f5e9; color: #2e7d32; }
    .btn-delete { background: #ffebee; color: #c62828; }

    .reply-form { display: none; margin-top: 0.8rem; }
    .reply-form textarea {
      width: 100%;
      background: #f5f2ee;
      border: 2px solid #e0dbd4;
      color: #2a2a2a;
      padding: 0.6rem 0.9rem;
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.9rem;
      min-height: 65px;
      resize: vertical;
      margin-bottom: 0.5rem;
    }
    .reply-form textarea:focus { outline: none; border-color: #f5a623; }
    .btn-reply-send {
      background: #f5a623;
      color: #fff;
      border: none;
      padding: 0.5rem 1.4rem;
      border-radius: 999px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .loading { text-align: center; padding: 2rem; color: #aaa; font-style: italic; }
    .empty-state { text-align: center; padding: 2.5rem 1rem; color: #bbb; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 0.8rem; }

    /* ADMIN BAR */
    .admin-bar { text-align: right; margin-bottom: 1rem; }
    .btn-admin-toggle {
      background: transparent;
      border: 2px solid #ddd;
      color: #bbb;
      padding: 0.4rem 1.1rem;
      font-size: 0.78rem;
      font-weight: 700;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-admin-toggle:hover { border-color: #e8463a; color: #e8463a; }
    .btn-admin-toggle.active { border-color: #e8463a; color: #e8463a; background: #fff5f5; }

    /* MODAL */
    .admin-login-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .admin-login-modal.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 2rem;
      width: min(340px, 90vw);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .modal-box h3 {
      font-family: 'Caveat', cursive;
      font-size: 1.8rem;
      color: #2a2a2a;
      margin-bottom: 1rem;
    }
    .modal-box input {
      width: 100%;
      background: #f5f2ee;
      border: 2px solid #e0dbd4;
      color: #2a2a2a;
      padding: 0.65rem 1rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: 'Nunito', sans-serif;
      margin-bottom: 1rem;
    }
    .modal-box input:focus { outline: none; border-color: #e8463a; }
    .modal-row { display: flex; gap: 0.8rem; align-items: center; }
    .btn-cancel {
      background: #f5f2ee;
      border: none;
      color: #888;
      padding: 0.65rem 1.2rem;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* ── LOGO FOND ── */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(520px, 90vw);
      height: min(520px, 90vw);
      background: url('logo.png') center / contain no-repeat;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    main, .btn-back, .site-title, .page-label, .logo-wrap, .site-subtitle, footer {
      position: relative;
      z-index: 1;
    }

    .site-subtitle {
      font-family: 'Caveat', cursive;
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: #666;
      text-align: center;
      margin-top: 1rem;
    }
    footer {
      text-align: center;
      padding: 0.8rem 1rem 2rem;
      color: #bbb;
      font-size: 0.82rem;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="site-title">Les Tapas Nocturnes</div>
  <div class="page-label">⭐ Livre d'Or</div>


  <a href="index.html" class="btn-back">← Retour à l'accueil</a>

  <main>

    <div class="form-card">
      <h2>✍️ Laissez-nous un mot !</h2>

      <div class="form-row">
        <label>Votre prénom / pseudo</label>
        <input type="text" id="inp-nom" placeholder="Marie, Jean-Pierre…" maxlength="60" />
      </div>

      <div class="form-row">
        <label>Note</label>
        <div class="stars-input" id="stars-input">
          <span data-v="1">★</span>
          <span data-v="2">★</span>
          <span data-v="3">★</span>
          <span data-v="4">★</span>
          <span data-v="5">★</span>
        </div>
      </div>

      <div class="form-row">
        <label>Votre message</label>
        <textarea id="inp-texte" placeholder="Un super concert, une ambiance de feu…" maxlength="600"></textarea>
      </div>

      <button class="btn-submit" id="btn-submit">🎶 Publier mon message</button>
      <div class="form-feedback" id="form-feedback"></div>
    </div>

    <div class="admin-bar">
      <button class="btn-admin-toggle" id="btn-admin-toggle">🔐 Mode admin</button>
    </div>

    <div class="messages-header">
      <div class="messages-title">💬 Ce que vous dites de nous</div>
      <span class="msg-count" id="msg-count"></span>
    </div>

    <div id="messages-list">
      <div class="loading">Chargement des messages…</div>
    </div>

  </main>

  <div class="admin-login-modal" id="admin-modal">
    <div class="modal-box">
      <h3>🔐 Accès admin</h3>
      <input type="password" id="admin-pwd-input" placeholder="Mot de passe" />
      <div class="modal-row">
        <button class="btn-submit" id="btn-admin-login" style="padding:0.65rem 1.4rem;font-size:0.9rem;">Connexion</button>
        <button class="btn-cancel" id="btn-admin-cancel">Annuler</button>
      </div>
      <div class="form-feedback" id="admin-feedback" style="margin-top:0.8rem;"></div>
    </div>
  </div>

  <div class="site-subtitle">Musique pour l'apéro</div>
  <footer>Une création de l'association Zikomatiques</footer>

<script>
const SUPABASE_URL   = 'https://azugmxqtxvapuqsjmwlx.supabase.co';
const SUPABASE_KEY   = 'sb_publishable_puWQw_R_0UlSVOQquYnbEw_s_DvMOa3';
const ADMIN_PASSWORD = 'Mouguerre2013!';

let isAdmin = false;
let selectedStars = 5;

const starsInput = document.getElementById('stars-input');
starsInput.querySelectorAll('span').forEach(s => {
  s.addEventListener('click', () => { selectedStars = parseInt(s.dataset.v); updateStarsUI(); });
});
function updateStarsUI() {
  starsInput.querySelectorAll('span').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.v) <= selectedStars);
  });
}
updateStarsUI();

async function supaFetch(path, method = 'GET', body = null, extra = {}) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=minimal',
      ...extra
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!r.ok) { const err = await r.text(); throw new Error(err); }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

async function loadMessages() {
  try {
    const data = await supaFetch('messages?order=created_at.desc&select=*', 'GET', null, { 'Prefer': '' });
    renderMessages(data || []);
  } catch(e) {
    document.getElementById('messages-list').innerHTML = '<div class="loading">Erreur de chargement.</div>';
    console.error(e);
  }
}

function renderMessages(messages) {
  const list = document.getElementById('messages-list');
  document.getElementById('msg-count').textContent = messages.length
    ? `— ${messages.length} message${messages.length > 1 ? 's' : ''}` : '';

  if (!messages.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🎶</div><p>Soyez le premier à laisser un message !</p></div>';
    return;
  }

  list.innerHTML = messages.map(m => {
    const stars = '★'.repeat(m.etoiles) + '☆'.repeat(5 - m.etoiles);
    const date  = new Date(m.created_at).toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
    const reply = m.reponse
      ? `<div class="band-reply"><div class="band-reply-label">🎸 Réponse du groupe</div><p>${escHtml(m.reponse)}</p></div>` : '';
    const adminControls = `
      <div class="admin-controls ${isAdmin ? 'visible' : ''}" id="ctrl-${m.id}">
        <button class="btn-sm btn-reply" onclick="toggleReplyForm('${m.id}')">✏️ Répondre</button>
        <button class="btn-sm btn-delete" onclick="deleteMessage('${m.id}')">🗑️ Supprimer</button>
      </div>
      <div class="reply-form" id="reply-form-${m.id}">
        <textarea id="reply-text-${m.id}" placeholder="Votre réponse…"></textarea>
        <button class="btn-reply-send" onclick="submitReply('${m.id}')">Envoyer</button>
      </div>`;
    return `
      <div class="message-card" id="msg-${m.id}">
        <div class="msg-top">
          <span class="msg-author">${escHtml(m.nom)}</span>
          <span class="msg-date">${date}</span>
        </div>
        <div class="msg-stars">${stars}</div>
        <div class="msg-text">${escHtml(m.texte)}</div>
        ${reply}${adminControls}
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('btn-submit').addEventListener('click', async () => {
  const nom   = document.getElementById('inp-nom').value.trim();
  const texte = document.getElementById('inp-texte').value.trim();
  if (!nom || !texte) { showFeedback('form-feedback','error','Merci de remplir votre prénom et votre message.'); return; }
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Envoi…';
  try {
    await supaFetch('messages', 'POST', { nom, texte, etoiles: selectedStars });
    document.getElementById('inp-nom').value = '';
    document.getElementById('inp-texte').value = '';
    selectedStars = 5; updateStarsUI();
    showFeedback('form-feedback','success','✓ Merci pour votre message !');
    setTimeout(loadMessages, 1000);
  } catch(e) {
    showFeedback('form-feedback','error','Erreur lors de l\'envoi. Réessayez.');
  }
  btn.disabled = false; btn.textContent = '🎶 Publier mon message';
});

document.getElementById('btn-admin-toggle').addEventListener('click', () => {
  if (isAdmin) {
    isAdmin = false;
    document.getElementById('btn-admin-toggle').classList.remove('active');
    document.getElementById('btn-admin-toggle').textContent = '🔐 Mode admin';
    loadMessages();
  } else {
    document.getElementById('admin-modal').classList.add('open');
    document.getElementById('admin-pwd-input').value = '';
    document.getElementById('admin-pwd-input').focus();
  }
});
document.getElementById('btn-admin-cancel').addEventListener('click', () => {
  document.getElementById('admin-modal').classList.remove('open');
});
document.getElementById('btn-admin-login').addEventListener('click', () => {
  if (document.getElementById('admin-pwd-input').value === ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById('admin-modal').classList.remove('open');
    document.getElementById('btn-admin-toggle').classList.add('active');
    document.getElementById('btn-admin-toggle').textContent = '🔓 Admin actif';
    loadMessages();
  } else {
    showFeedback('admin-feedback','error','Mot de passe incorrect.');
  }
});
document.getElementById('admin-pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-admin-login').click();
});

function toggleReplyForm(id) {
  const f = document.getElementById('reply-form-' + id);
  f.style.display = f.style.display === 'block' ? 'none' : 'block';
  if (f.style.display === 'block') f.querySelector('textarea').focus();
}
async function submitReply(id) {
  const texte = document.getElementById('reply-text-' + id).value.trim();
  if (!texte) return;
  try { await supaFetch(`messages?id=eq.${id}`, 'PATCH', { reponse: texte }); loadMessages(); }
  catch(e) { alert('Erreur lors de la réponse.'); }
}
async function deleteMessage(id) {
  if (!confirm('Supprimer ce message définitivement ?')) return;
  try { await supaFetch(`messages?id=eq.${id}`, 'DELETE'); loadMessages(); }
  catch(e) { alert('Erreur lors de la suppression.'); }
}
function showFeedback(elId, type, msg) {
  const el = document.getElementById(elId);
  el.className = 'form-feedback ' + type;
  el.textContent = msg;
  setTimeout(() => { el.className = 'form-feedback'; }, 6000);
}

loadMessages();
</script>
</body>
</html>
